# ~/.config/foot/foot.ini — Editorial Paper (warm light)
# Portable: works on any distro with foot. New terminals pick up edits.

[main]
font=JetBrainsMono Nerd Font:size=11
pad=16x16
dpi-aware=yes

[colors]
alpha=1.0
foreground=2a2620
background=f4f1e8

# normal
regular0=43403a
regular1=a3432f
regular2=5f7040
regular3=9a7218
regular4=3a6ea5
regular5=8a5673
regular6=3f7d75
regular7=6b6456
# bright
bright0=6b6456
bright1=b6503a
bright2=6f8049
bright3=b0842f
bright4=4a7fb0
bright5=9a6683
bright6=4a8f86
bright7=3a352c

selection-foreground=1b1916
selection-background=e2dccd
# cursor: <text-under-cursor> <cursor-block>
cursor=f4f1e8 a35e3a
