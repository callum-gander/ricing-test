# ~/.config/foot/foot.ini — Catppuccin Mocha
# Portable: works on any distro with foot. Edit + save → new terminals pick it up.

font=JetBrainsMono Nerd Font:size=11
pad=14x14
dpi-aware=yes

[cursor]
color=1e1e2e f5e0dc

[colors]
alpha=0.94
background=1e1e2e
foreground=cdd6f4

# black / bright-black
regular0=45475a
bright0=585b70
# red
regular1=f38ba8
bright1=f38ba8
# green
regular2=a6e3a1
bright2=a6e3a1
# yellow
regular3=f9e2af
bright3=f9e2af
# blue
regular4=89b4fa
bright4=89b4fa
# magenta
regular5=f5c2e7
bright5=f5c2e7
# cyan
regular6=94e2d5
bright6=94e2d5
# white
regular7=bac2de
bright7=a6adc8

selection-foreground=cdd6f4
selection-background=414356
