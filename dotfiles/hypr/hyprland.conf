# ~/.config/hypr/hyprland.conf
# ─────────────────────────────────────────────────────────────────────────────
# PORTABLE Hyprland config. This exact file works on ANY distro running Hyprland
# (NixOS now, Fedora/Arch later). Edit + save → Hyprland hot-reloads instantly.
# Wiki reference: https://wiki.hypr.land/Configuring/
# ─────────────────────────────────────────────────────────────────────────────

# ---- Monitors ----
# Catch-all: use preferred resolution, auto position, scale 1.
monitor = , preferred, auto, 1

# ---- Autostart ----
exec-once = swaybg -c 1e1e2e      # solid Catppuccin Mocha backdrop (animated awww wallpaper coming next)
exec-once = quickshell            # our Quickshell bar/shell
exec-once = swaync                # notification centre (replaces mako)
exec-once = hypridle              # idle → lock (see hypridle.conf)
# (network + bluetooth live in the bar's own icons now, so no applet tray icons)

# ---- Environment ----
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland     # Quickshell (Qt) must use the Wayland plugin, not X11/xcb

# ---- VM-friendly rendering ----
cursor {
    no_hardware_cursors = true    # hardware cursors are usually broken in VMs; remove on real hardware
}

# ---- Input ----
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# LOOK & FEEL — the fun part. Tweak freely; it hot-reloads on save.
# ─────────────────────────────────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(89b4faff) rgba(cba6f7ff) 45deg
    col.inactive_border = rgba(45475aaa)
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.97       # subtle translucency for depth (with blur)
    inactive_opacity = 0.90
    blur {
        enabled = true
        size = 6
        passes = 2
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
    }
}

animations {
    enabled = true
    bezier = overshoot, 0.05, 0.9, 0.1, 1.05
    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 5, overshoot, popin 80%
    animation = windowsOut, 1, 5, smooth, popin 80%
    animation = fade, 1, 5, smooth
    animation = border, 1, 8, smooth
    animation = workspaces, 1, 6, smooth, slidefade 20%
}

dwindle {
    preserve_split = true    # required for the layoutmsg togglesplit bind below
}

# ─────────────────────────────────────────────────────────────────────────────
# KEYBINDS
# ─────────────────────────────────────────────────────────────────────────────
$mod = SUPER
$term = env LIBGL_ALWAYS_SOFTWARE=1 ghostty   # VM has no real OpenGL; software-render Ghostty. foot on Super+Shift+Return
$menu = rofi -show drun

bind = $mod, Return, exec, $term
bind = $mod SHIFT, Return, exec, foot   # reliable fallback terminal (VM GL escape hatch)
bind = $mod, D, exec, $menu
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen
bind = $mod, Space, layoutmsg, togglesplit

# focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4

# mouse drag to move/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# screenshot a region to clipboard
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# ─────────────────────────────────────────────────────────────────────────────
# FUNCTIONAL RICE
# ─────────────────────────────────────────────────────────────────────────────

bind = $mod, L, exec, hyprlock                 # lock screen
bind = $mod, N, exec, swaync-client -t -sw     # toggle notification centre
bind = $mod, P, exec, nwg-displays             # display / monitor settings

# Scratchpad — a hidden "magic" workspace you toggle in/out
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Resize submap: Super+R, then arrows to resize, Escape/Enter to exit
bind = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive, 20 0
binde = , left, resizeactive, -20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# Per-app window rules (block syntax; each block needs a unique `name` key first)
windowrule {
    name = float-pavucontrol
    match:class = pavucontrol
    float = true
}
windowrule {
    name = float-nm-editor
    match:class = nm-connection-editor
    float = true
}
windowrule {
    name = float-imv
    match:class = imv
    float = true
}
windowrule {
    name = pip
    match:title = Picture-in-Picture
    float = true
    pin = true
}
