# ~/.config/hypr/hyprlock.conf — Editorial Paper (warm light) lock screen
# Portable. Blur is off (the VM has no real GL); add a blurred screenshot bg on real hardware.

background {
    monitor =
    color = rgba(f4f1e8ff)
}

input-field {
    monitor =
    size = 260, 52
    outline_thickness = 1
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(a35e3a)
    inner_color = rgb(faf8f2)
    font_color = rgb(1b1916)
    fade_on_empty = false
    placeholder_text = Password
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(1b1916)
    font_size = 78
    font_family = Playfair Display
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgb(8b8475)
    font_size = 20
    font_family = Noto Sans
    position = 0, 60
    halign = center
    valign = center
}
