# ~/.config/hypr/hyprlock.conf — Catppuccin Mocha lock screen
# Portable. Blur is off (the VM has no real GL); add a blurred screenshot bg on real hardware.

background {
    monitor =
    color = rgba(1e1e2eff)
}

input-field {
    monitor =
    size = 260, 52
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(89b4fa)
    inner_color = rgb(313244)
    font_color = rgb(cdd6f4)
    fade_on_empty = false
    placeholder_text = Password
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(cdd6f4)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgb(a6adc8)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}
