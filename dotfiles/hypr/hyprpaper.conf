# ~/.config/hypr/hyprpaper.conf — Mocha gradient wallpaper
# The image is generated by Nix (home.file "Pictures/wall.png").
# For an animated/video wallpaper later, swap hyprpaper for awww (flake input).

preload = /home/callum/Pictures/wall.png
wallpaper = , /home/callum/Pictures/wall.png
splash = false
ipc = off
