# ~/.config/starship.toml — Editorial Paper prompt
# Portable. Glyphs render via the Nerd Font; colours are the paper accents.

"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true

format = "$directory$git_branch$git_status $character"

[directory]
style = "bold #a35e3a"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold #b0842f"

[git_status]
style = "bold #a3432f"

[character]
success_symbol = "[❯](bold #5f7040)"
error_symbol = "[❯](bold #a3432f)"
