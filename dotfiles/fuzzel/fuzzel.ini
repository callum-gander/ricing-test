# ~/.config/fuzzel/fuzzel.ini — Catppuccin Mocha
# Portable: works on any distro with fuzzel.

[main]
font=JetBrainsMono Nerd Font:size=13
prompt=❯
lines=10
width=32
horizontal-pad=22
vertical-pad=16
inner-pad=10

[colors]
background=1e1e2eee
text=cdd6f4ff
prompt=b4befeff
placeholder=6c7086ff
input=cdd6f4ff
match=89b4faff
selection=585b70ff
selection-text=cdd6f4ff
selection-match=89b4faff
border=89b4faff

[border]
width=2
radius=16
