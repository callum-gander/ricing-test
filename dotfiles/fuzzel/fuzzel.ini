# ~/.config/fuzzel/fuzzel.ini — Editorial Paper (warm light)
# Portable: works on any distro with fuzzel. (rofi is the default $menu; this is the fallback.)

[main]
font=Noto Sans:size=13
prompt=❯
lines=10
width=32
horizontal-pad=22
vertical-pad=16
inner-pad=10

[colors]
background=faf8f2ff
text=1b1916ff
prompt=a35e3aff
placeholder=8b8475ff
input=1b1916ff
match=a35e3aff
selection=ece7ddff
selection-text=1b1916ff
selection-match=a35e3aff
border=d9d2c5ff

[border]
width=1
radius=0
